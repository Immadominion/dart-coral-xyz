name: coral_xyz
description: |
  A Dart client for Anchor programs on Solana.
  Provides type-safe program interactions, IDL parsing, and seamless integration
  with Solana's Anchor framework.
version: 1.0.0-beta.5
homepage: https://github.com/Immadominion/dart-coral-xyz
repository: https://github.com/Immadominion/dart-coral-xyz
issue_tracker: https://github.com/Immadominion/dart-coral-xyz/issues
documentation: https://pub.dev/documentation/coral_xyz

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  # Core Dart dependencies
  analyzer: ^6.4.1
  base_codecs: ^1.0.1                  # Additional base encodings
  blockchain_utils: ^5.0.0             # Enhanced blockchain utilities
  borsh: ^0.3.2                        # Primary Borsh serialization
  borsh_annotation: ^0.3.2             # Borsh annotations for better type support
  bs58: ^1.0.2                         # Base58 encoding (Bitcoin-style)
  build: ^2.4.1                        # Builder API for code generation (compatible with source_gen)
  convert: ^3.1.1
  crypto: ^3.0.3                       # SHA256 and other hash functions
  cryptography: ^2.7.0                 # ED25519, X25519, and other crypto
  ed25519_hd_key: ^2.3.0               # HD key derivation for wallet support
  equatable: ^2.0.5                    # Value equality
  http: ^1.1.0                         # Required by solana package
  logging: ^1.3.0                      # Proper logging framework
  meta: ^1.9.1                         # Dart meta annotations
  path: ^1.8.0                         # Path manipulation utilities
  solana: ^0.31.2+1                    # Primary Solana RPC client
  source_gen: ^1.5.0                   # Source code generation support (compatible with borsh)
  toml: ^0.16.0                        # TOML parsing for Anchor.toml files
  web_socket_channel: ^3.0.0           # WebSocket support for event system

dev_dependencies:
  build_runner: ^2.4.7
  lints: ^6.0.0
  mockito: ^5.4.2
  test: ^1.24.0

# Build configuration for code generation
build_runner:
  builders:
    coral_xyz:
      import: "package:coral_xyz/builder.dart"
      builder_factories:
        - anchorBuilder
      build_extensions:
        ".dart": [".anchor.dart"]
      auto_apply: dependents
      build_to: source
      applies_builders: ["source_gen:combining_builder"]

# Uncomment for Flutter package
# flutter:
#   plugin:
#     platforms:
#       android:
#         package: com.example.coral_xyz_anchor
#         pluginClass: CoralXyzAnchorPlugin
#       ios:
#         pluginClass: CoralXyzAnchorPlugin

topics:
  - solana
  - anchor
  - blockchain
  - web3
  - crypto

