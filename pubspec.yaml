name: coral_xyz
description: |
  A universal Dart client for Solana programs — Anchor, Quasar, and Pinocchio.
  Provides dynamic IDL-based program interactions, zero-copy account decoding,
  multi-framework discriminator support, and seamless integration with the
  Solana ecosystem.
version: 1.0.0-beta.9
homepage: https://github.com/Immadominion/dart-coral-xyz
repository: https://github.com/Immadominion/dart-coral-xyz
issue_tracker: https://github.com/Immadominion/dart-coral-xyz/issues
documentation: https://pub.dev/documentation/coral_xyz

environment:
  sdk: ^3.9.0

dependencies:
  solana: ^0.31.2
  borsh_annotation: ^0.3.2
  crypto: ^3.0.3
  ffi: ^2.2.0
  logging: ^1.3.0
  meta: ^1.16.0
  path: ^1.9.0
  convert: ^3.1.1

dev_dependencies:
  build_runner: ^2.13.0
  coral_xyz_codegen: ^1.0.0-beta.9
  lints: ^6.0.0
  mockito: ^5.6.0
  test: ^1.25.0

topics:
  - solana
  - anchor
  - quasar
  - blockchain
  - web3
